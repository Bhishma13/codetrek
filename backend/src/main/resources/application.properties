spring.application.name=demo

# PostgreSQL — Railway injects PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Redis — Railway auto-injects REDIS_URL
spring.data.redis.url=${REDIS_URL}

# CORS — Set CORS_ALLOWED_ORIGIN to your Vercel URL in Railway dashboard
cors.allowed-origin=${CORS_ALLOWED_ORIGIN}